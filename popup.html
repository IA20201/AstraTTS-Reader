<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h3 {
      margin-bottom: 12px;
      font-size: 15px;
      color: #89b4fa;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 600;
    }
    .badge.astra { background: rgba(137,180,250,.2); color: #89b4fa; }
    .badge.openai { background: rgba(203,166,247,.2); color: #cba6f7; }
    label {
      display: block;
      margin: 10px 0 4px;
      font-size: 12px;
      color: #a6adc8;
    }
    input[type="text"], select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #45475a;
      border-radius: 4px;
      background: #313244;
      color: #cdd6f4;
      font-size: 13px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #89b4fa; }
    select { cursor: pointer; }
    .speed-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    input[type="range"] {
      flex: 1;
      accent-color: #89b4fa;
    }
    .speed-val {
      font-size: 12px;
      min-width: 28px;
      text-align: right;
      color: #a6adc8;
    }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      background: #89b4fa;
      color: #1e1e2e;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #74c7ec; }
    .status {
      margin-top: 8px;
      font-size: 11px;
      color: #a6e3a1;
      text-align: center;
      min-height: 16px;
    }
    .section { border-top: 1px solid #313244; margin-top: 10px; padding-top: 10px; }
    .hint { font-size: 10px; color: #585b70; margin-top: 2px; }
  </style>
</head>
<body>
  <h3>⭐ AstraTTS Reader <span id="modeBadge" class="badge astra">AstraTTS</span></h3>

  <label>API 模式</label>
  <select id="apiMode">
    <option value="astra">AstraTTS 原生</option>
    <option value="openai">OpenAI 兼容</option>
  </select>

  <label>服务地址</label>
  <input type="text" id="apiUrl" placeholder="http://localhost:5000">

  <div class="astra-field">
    <label>音色 ID (Avatar)</label>
    <input type="text" id="avatarId" placeholder="如 chenxing，留空用默认">
  </div>

  <div class="astra-field">
    <label>参考音频 ID (Reference)</label>
    <input type="text" id="referenceId" placeholder="如 normal, laugh，留空用默认">
  </div>

  <div class="openai-field" style="display:none">
    <label>API Key</label>
    <input type="text" id="apiKey" placeholder="sk-...">
  </div>

  <div class="openai-field" style="display:none">
    <label>Voice</label>
    <input type="text" id="voice" placeholder="voice name">
  </div>

  <div class="section">
    <label>语速</label>
    <div class="speed-row">
      <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0">
      <span class="speed-val" id="speedVal">1.0</span>
    </div>

    <label>音量</label>
    <div class="speed-row">
      <input type="range" id="volume" min="0" max="1" step="0.05" value="1.0">
      <span class="speed-val" id="volumeVal">1.0</span>
    </div>
    <div class="hint">流式播放已默认开启</div>
  </div>

  <button id="save">保存设置</button>
  <div class="status" id="status"></div>

  <div class="section" id="runtimeSection" style="display:none">
    <label>运行状态</label>
    <div id="runtimeInfo" style="font-size:11px; line-height:1.6; color:#a6adc8;"></div>
  </div>

  <script src="shared/config.js"></script>
  <script src="shared/settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
